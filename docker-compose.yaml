services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  wedding-app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - .env
    expose:
      - '3000'

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - wedding-app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
